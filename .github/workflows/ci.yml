name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: Chromium 설치
        run: npx --no-install playwright install --with-deps chromium

      - name: 단위 테스트
        run: npm test

      - name: 프로덕션 빌드
        run: npm run build

      - name: 브라우저 테스트
        run: npm run test:e2e:ci

      - name: 실패 자료 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
